---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: exitservers.frp.operator.io
spec:
  group: frp.operator.io
  names:
    kind: ExitServer
    listKind: ExitServerList
    plural: exitservers
    shortNames:
    - exit
    - exits
    singular: exitserver
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.publicIP
      name: IP
      type: string
    - jsonPath: .spec.provider
      name: Provider
      type: string
    - jsonPath: .status.usage.tunnels
      name: Tunnels
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              allowPorts:
                description: |-
                  AllowPorts is a list of port ranges (e.g. "1024-65535") or single ports
                  the operator may allocate to tunnels. Grow-only — admission webhook
                  rejects shrinks below current allocations (enforced in a later phase).
                items:
                  type: string
                minItems: 1
                type: array
              capacity:
                description: |-
                  ExitCapacity declares per-exit caps used for reservation math.
                  All fields optional; unset means "no limit on this dimension".
                properties:
                  bandwidthMbps:
                    format: int32
                    minimum: 0
                    type: integer
                  maxTunnels:
                    format: int32
                    minimum: 0
                    type: integer
                  monthlyTrafficGB:
                    format: int64
                    minimum: 0
                    type: integer
                type: object
              credentialsRef:
                description: SecretKeyRef points at a key in a Secret in the same
                  namespace as the referrer.
                properties:
                  key:
                    minLength: 1
                    type: string
                  name:
                    minLength: 1
                    type: string
                required:
                - key
                - name
                type: object
              frps:
                properties:
                  adminPort:
                    default: 7500
                    format: int32
                    maximum: 65535
                    minimum: 1
                    type: integer
                  bindPort:
                    default: 7000
                    format: int32
                    maximum: 65535
                    minimum: 1
                    type: integer
                  version:
                    description: Pinned frps release tag; the operator ships a bundled
                      checksum for it.
                    minLength: 1
                    type: string
                required:
                - version
                type: object
              provider:
                description: Provider identifies which Provisioner implementation
                  manages an exit's VPS.
                enum:
                - digitalocean
                - external
                - local-docker
                type: string
              region:
                type: string
              reservedPorts:
                description: |-
                  ReservedPorts is a list of ports the operator must NOT allocate even if
                  they fall inside AllowPorts. Defaults to [SSH.Port, Frps.BindPort,
                  Frps.AdminPort] when empty (defaulted in webhook in a later phase).
                items:
                  format: int32
                  type: integer
                type: array
              size:
                type: string
              ssh:
                properties:
                  port:
                    default: 22
                    format: int32
                    maximum: 65535
                    minimum: 1
                    type: integer
                type: object
            required:
            - allowPorts
            - frps
            - provider
            type: object
          status:
            properties:
              allocations:
                additionalProperties:
                  type: string
                description: |-
                  Allocations maps allocated public port (as string) to "namespace/name"
                  of the Tunnel that holds it. String keys because JSON object keys.
                type: object
              conditions:
                description: Conditions is the standard Kubernetes condition list.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              frpsVersion:
                type: string
              lastReconcileTime:
                format: date-time
                type: string
              phase:
                description: ExitPhase is the lifecycle phase of an ExitServer.
                enum:
                - Pending
                - Provisioning
                - Ready
                - Degraded
                - Unreachable
                - Lost
                - Draining
                - Deleting
                type: string
              providerID:
                type: string
              publicIP:
                type: string
              usage:
                description: ExitUsage is the running sum of tunnel reservations on
                  an exit.
                properties:
                  bandwidthMbps:
                    format: int32
                    type: integer
                  monthlyTrafficGB:
                    format: int64
                    type: integer
                  tunnels:
                    format: int32
                    type: integer
                required:
                - tunnels
                type: object
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
