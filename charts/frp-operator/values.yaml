nameOverride: ""
fullnameOverride: ""

replicas: 1

image:
  repository: ghcr.io/mtaku3/frp-operator
  tag: ""                   # "" → defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent
  pullSecrets: []

serviceAccount:
  create: true
  name: ""
  annotations: {}

rbac:
  create: true

leaderElection:
  enabled: true
  leaseNamespace: ""        # "" → release namespace

logLevel: info

resources:
  requests:
    cpu: 10m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 128Mi

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
priorityClassName: ""
podAnnotations: {}
podLabels: {}
extraArgs: []
extraEnv: []
extraVolumes: []
extraVolumeMounts: []

metrics:
  service:
    enabled: false
    port: 8443
    type: ClusterIP
    annotations: {}
  serviceMonitor:
    enabled: false
    additionalLabels: {}
    interval: 30s
    scrapeTimeout: 10s
    relabelings: []
    metricRelabelings: []

networkPolicy:
  enabled: false
  prometheusNamespace: ""

podDisruptionBudget:
  enabled: false
  minAvailable: 1
  maxUnavailable: ""

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
