version: "2"
run:
  allow-parallel-runners: true
linters:
  default: none
  enable:
    - copyloopvar
    - dupl
    - errcheck
    - ginkgolinter
    - goconst
    - gocyclo
    - govet
    - ineffassign
    - lll
    - modernize
    - misspell
    - nakedret
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
    - logcheck
  settings:
    custom:
      logcheck:
        type: "module"
        description: Checks Go logging calls for Kubernetes logging conventions.
    revive:
      rules:
        - name: comment-spacings
        - name: import-shadowing
    modernize:
      disable:
        - omitzero
  exclusions:
    generated: lax
    rules:
      - linters:
          - lll
        path: api/*
      # kubebuilder rbac markers are single-line and routinely exceed 120 chars.
      - linters:
          - lll
        source: "^// \\+kubebuilder:"
      # test helper signatures often span many parameters; readability beats wrapping.
      - linters:
          - lll
        path: test/*
      - linters:
          - dupl
          - lll
        path: internal/*
      # pkg/certs is a 1:1 port of CloudNativePG's certificate package; keep upstream patterns.
      - path: pkg/certs/
        linters:
          - errcheck
          - goconst
          - gocyclo
          - lll
          - modernize
          - revive
          - staticcheck
          - unparam
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
