- op: add
  path: /spec/template/spec/volumes/-
  value:
    name: docker-sock
    hostPath:
      path: /var/run/docker.sock
      type: Socket
- op: add
  path: /spec/template/spec/containers/0/volumeMounts/-
  value:
    name: docker-sock
    mountPath: /var/run/docker.sock
- op: add
  path: /spec/template/spec/containers/0/env/-
  value:
    name: DOCKER_HOST
    value: unix:///var/run/docker.sock
- op: add
  path: /spec/template/spec/containers/0/env/-
  value:
    name: LOCALDOCKER_NETWORK
    value: kind
- op: add
  path: /spec/template/spec/containers/0/env/-
  value:
    name: TMPDIR
    value: /tmp/frp-operator-shared
- op: add
  path: /spec/template/spec/containers/0/env/-
  value:
    name: LOCALDOCKER_SKIP_HOST_PORT_PUBLISH
    value: "1"
- op: add
  path: /spec/template/spec/volumes/-
  value:
    name: shared-tmp
    hostPath:
      path: /tmp/frp-operator-shared
      type: Directory
- op: add
  path: /spec/template/spec/containers/0/volumeMounts/-
  value:
    name: shared-tmp
    mountPath: /tmp/frp-operator-shared
- op: replace
  path: /spec/template/spec/containers/0/securityContext
  value:
    runAsUser: 0
    runAsGroup: 0
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
- op: remove
  path: /spec/template/spec/securityContext
