---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: tunnels.frp.operator.io
spec:
  group: frp.operator.io
  names:
    kind: Tunnel
    listKind: TunnelList
    plural: tunnels
    shortNames:
    - tn
    singular: tunnel
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.assignedExit
      name: Exit
      type: string
    - jsonPath: .status.assignedIP
      name: IP
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              exitClaimRef:
                description: |-
                  ExitClaimRef hard-pins the tunnel to a specific ExitClaim, bypassing
                  the scheduler.
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              ports:
                items:
                  properties:
                    name:
                      description: Name is a free-form identifier; required when there
                        is more than one port.
                      type: string
                    protocol:
                      default: TCP
                      description: Protocol is "TCP" (default) or "UDP".
                      enum:
                      - TCP
                      - UDP
                      type: string
                    publicPort:
                      description: |-
                        PublicPort is the requested public port on the exit. 0 means
                        auto-assign from AllowPorts.
                      format: int32
                      type: integer
                    servicePort:
                      description: ServicePort is the in-cluster port frpc forwards
                        traffic from.
                      format: int32
                      type: integer
                  required:
                  - servicePort
                  type: object
                type: array
              requirements:
                items:
                  description: |-
                    NodeSelectorRequirementWithMinValues is the requirement struct used in
                    ExitPool/ExitClaim/Tunnel requirements lists. It mirrors Karpenter's
                    equivalent and adds the optional MinValues knob.
                  properties:
                    key:
                      description: Key is the label/requirement key.
                      type: string
                    minValues:
                      description: |-
                        MinValues forces the scheduler to consider at least N distinct
                        values for this key when packing.
                      type: integer
                    operator:
                      description: Operator is one of In, NotIn, Exists, DoesNotExist,
                        Gt, Lt.
                      type: string
                    values:
                      description: |-
                        Values is the operand list. Required for In, NotIn, Gt, Lt;
                        must be empty for Exists, DoesNotExist.
                      items:
                        type: string
                      type: array
                  required:
                  - key
                  - operator
                  type: object
                type: array
              resources:
                description: Resources.Requests is the binpack input. Optional; empty
                  fits anywhere.
                properties:
                  requests:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: ResourceList is a set of (resource name, quantity)
                      pairs.
                    type: object
                type: object
            required:
            - ports
            type: object
          status:
            properties:
              assignedExit:
                description: AssignedExit is the name of the ExitClaim this tunnel
                  is bound to.
                type: string
              assignedIP:
                description: AssignedIP is the public IP of the assigned ExitClaim.
                type: string
              assignedPorts:
                description: |-
                  AssignedPorts are the resolved public port numbers (auto-assigned
                  values filled in for PublicPort=0 inputs).
                items:
                  format: int32
                  type: integer
                type: array
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              phase:
                description: Phase is a coarse summary of Conditions.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
