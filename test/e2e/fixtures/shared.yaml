---
apiVersion: frp.operator.io/v1alpha1
kind: SchedulingPolicy
metadata:
  name: default
spec:
  consolidation:
    reclaimEmpty: true
    drainAfter: 30s
  vps:
    default:
      provider: local-docker
      allowPorts: ["80", "81", "1024-65535"]
---
apiVersion: v1
kind: Secret
metadata:
  name: local-docker-credentials
  namespace: default
type: Opaque
stringData:
  token: e2e-token
