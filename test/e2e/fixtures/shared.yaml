---
apiVersion: frp.operator.io/v1alpha1
kind: LocalDockerProviderClass
metadata:
  name: default
spec:
  network: kind
  configHostMountPath: /tmp/frp-operator-shared
  imagePullPolicy: IfNotPresent
  skipHostPortPublishing: true
  defaultImage: "fatedier/frps:%s"
---
apiVersion: frp.operator.io/v1alpha1
kind: ExitPool
metadata:
  name: default
spec:
  template:
    spec:
      providerClassRef:
        group: frp.operator.io
        kind: LocalDockerProviderClass
        name: default
      frps:
        version: "v0.68.1"
        bindPort: 7000
        adminPort: 7400
        allowPorts: ["80", "81", "1024-65535"]
        auth:
          method: token
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 10s
    budgets: []
  limits:
    frp.operator.io/exits: "5"
---
apiVersion: v1
kind: Secret
metadata:
  name: local-docker-credentials
  namespace: frp-operator-system
type: Opaque
stringData:
  token: "test-token"
