name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check linter configuration
        run: make lint-config
      - name: Run linter
        run: make lint

  helm-lint:
    name: Helm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.2
      - name: helm lint
        run: |
          helm lint charts/frp-operator-crd
          helm lint charts/frp-operator
      - name: helm template (parse check)
        run: |
          helm template tcrd charts/frp-operator-crd > /dev/null
          helm template top  charts/frp-operator     > /dev/null
      - name: CRD sync drift gate
        run: |
          make helm-crds
          git diff --exit-code charts/

  site-gen-drift:
    name: Site reference drift gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync
      - run: make site-gen
      - run: git diff --exit-code site/src/content/docs/reference/
