#cloud-config
package_update: true
package_upgrade: false

write_files:
  - path: /etc/frp/frps.toml
    permissions: "0600"
    owner: root:root
    encoding: b64
    content: YmluZFBvcnQgPSA3MDAwClthdXRoXQp0b2tlbiA9ICJhYmMiCg==
  - path: /etc/systemd/system/frps.service
    permissions: "0644"
    owner: root:root
    content: |
      [Unit]
      Description=FRP server (frps)
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=simple
      ExecStart=/usr/local/bin/frps -c /etc/frp/frps.toml
      Restart=always
      RestartSec=5

      [Install]
      WantedBy=multi-user.target

runcmd:
  - set -eux
  - cd /tmp
  - curl -fsSL -o frp.tar.gz https://github.com/fatedier/frp/releases/download/v0.65.0/frp_0.65.0_linux_amd64.tar.gz
  - echo "abc1234567890123456789012345678901234567890123456789012345678901  frp.tar.gz" | sha256sum -c -
  - tar -xzf frp.tar.gz --strip-components=1 -C /usr/local/bin frp_0.65.0_linux_amd64/frps
  - chmod +x /usr/local/bin/frps
  - ufw --force enable
  - ufw allow 7000/tcp
  - ufw allow 7500/tcp
  - ufw allow 1024:65535/tcp
  - ufw deny 22/tcp || true
  - ufw deny 7000/tcp || true
  - ufw deny 7500/tcp || true
  - systemctl daemon-reload
  - systemctl enable --now frps.service
