---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ""
  resources:
  - services
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ""
  resources:
  - services/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - frp.operator.io
  resources:
  - exitservers
  - schedulingpolicies
  - tunnels
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - frp.operator.io
  resources:
  - exitservers/finalizers
  - schedulingpolicies/finalizers
  - tunnels/finalizers
  verbs:
  - update
- apiGroups:
  - frp.operator.io
  resources:
  - exitservers/status
  - schedulingpolicies/status
  - tunnels/status
  verbs:
  - get
  - patch
  - update
