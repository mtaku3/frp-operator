---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rsync-backend
  namespace: default
spec:
  replicas: 1
  selector: {matchLabels: {app: rsync-backend}}
  template:
    metadata: {labels: {app: rsync-backend}}
    spec:
      containers:
      - name: http-echo
        image: hashicorp/http-echo
        args: ["-text=rsync", "-listen=:8080"]
        ports: [{containerPort: 8080}]
---
apiVersion: v1
kind: Service
metadata:
  name: rsync-svc
  namespace: default
spec:
  type: LoadBalancer
  loadBalancerClass: frp-operator.io/frp
  ports: [{name: http, port: 80, targetPort: 8080, protocol: TCP}]
  selector: {app: rsync-backend}
