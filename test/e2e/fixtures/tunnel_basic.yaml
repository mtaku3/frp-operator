---
apiVersion: frp.operator.io/v1alpha1
kind: SchedulingPolicy
metadata:
  name: default
spec:
  consolidation:
    reclaimEmpty: false
  vps:
    default:
      provider: local-docker
      allowPorts: ["80", "1024-65535"]
---
apiVersion: v1
kind: Secret
metadata:
  name: local-docker-credentials
  namespace: default
type: Opaque
stringData:
  token: e2e-token
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tunnel-basic-be
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels: {app: tunnel-basic}
  template:
    metadata:
      labels: {app: tunnel-basic}
    spec:
      containers:
      - name: http-echo
        image: hashicorp/http-echo
        args: ["-text=tunnel-basic", "-listen=:8080"]
        ports: [{containerPort: 8080}]
---
apiVersion: v1
kind: Service
metadata:
  name: tunnel-basic
  namespace: default
spec:
  type: LoadBalancer
  loadBalancerClass: frp-operator.io/frp
  ports: [{name: http, port: 80, targetPort: 8080, protocol: TCP}]
  selector: {app: tunnel-basic}
